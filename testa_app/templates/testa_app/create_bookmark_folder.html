{% extends 'base.html' %}
{% load static %}

{% block title %}Create Bookmark Folder - Testa StudyBuddy{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4" style="color: #667eea; font-weight: 600;">Create Bookmark Folder</h1>
    
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card" style="border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg" style="background: #667eea; border: none; border-radius: 25px; padding: 12px 40px;">
                                📁 Create Folder
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
