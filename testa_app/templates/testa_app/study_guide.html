{% extends 'base.html' %}
{% load static %}

{% block title %}Study Guide - Testa StudyBuddy{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4" style="color: #667eea; font-weight: 600;">Study Guide: {{ topic }}</h1>
    
    <div class="card mb-3" style="border-radius: 15px;">
        <div class="card-body">
            <p><strong>Document:</strong> {{ document.title|default:document.file.name }}</p>
            <p><strong>Topic:</strong> {{ topic }}</p>
        </div>
    </div>

    <div class="card" style="border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Study Guide</h3>
                <div>
                    <button onclick="window.print()" class="btn btn-sm btn-outline-primary">🖨️ Print</button>
                </div>
            </div>
            <div style="white-space: pre-wrap; font-size: 16px; line-height: 1.8;">{{ study_guide }}</div>
        </div>
    </div>
</div>

<style>
    @media print {
        .navbar, .footer, button {
            display: none;
        }
    }
</style>
{% endblock %}
